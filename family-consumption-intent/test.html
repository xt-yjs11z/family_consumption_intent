<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭消费意图识别助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .main-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-container, .result-container {
            background: #fff;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .chat-container { height: 55vh; }
        .result-container { height: 40vh; }
        
        .chat-header, .result-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        
        .avatar { width: 36px; height: 36px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .header-info h2 { font-size: 15px; font-weight: 600; }
        .header-info p { font-size: 11px; opacity: 0.8; }
        
        .family-tabs { background: #fff; padding: 8px 16px; display: flex; gap: 8px; border-bottom: 1px solid #eee; overflow-x: auto; flex-shrink: 0; }
        .family-tab { padding: 5px 12px; border: 1px solid #ddd; border-radius: 14px; background: #fff; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .family-tab.active { background: #1e3c72; color: #fff; border-color: #1e3c72; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
        .message { display: flex; gap: 8px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .message.bot .msg-avatar { background: #1e3c72; color: #fff; }
        .message.user .msg-avatar { background: #4CAF50; color: #fff; }
        .msg-content { background: #fff; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message.user .msg-content { background: #1e3c72; color: #fff; }
        
        .quick-inputs { background: #f8f9fa; padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
        .quick-btn { padding: 4px 10px; background: #fff; border: 1px solid #ddd; border-radius: 12px; font-size: 10px; white-space: nowrap; cursor: pointer; }
        
        .chat-input { background: #fff; padding: 10px 16px; display: flex; gap: 10px; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
        .chat-input input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 13px; outline: none; }
        .chat-input input:focus { border-color: #1e3c72; }
        .chat-input button { width: 38px; height: 38px; border: none; border-radius: 50%; background: #1e3c72; color: #fff; cursor: pointer; }
        
        .result-header { font-size: 15px; font-weight: 600; }
        .result-content { flex: 1; overflow-y: auto; padding: 14px; }
        
        .empty-state { text-align: center; padding: 30px 20px; color: #999; }
        .empty-state-icon { font-size: 36px; margin-bottom: 8px; }
        
        /* 表格形式展示 - 类似飞书/MEMORY */
        .intent-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        
        .intent-table th {
            background: #f5f5f5;
            padding: 10px 12px;
            text-align: left;
            font-size: 12px;
            color: #666;
            font-weight: 600;
            border-bottom: 1px solid #eee;
        }
        
        .intent-table td {
            padding: 10px 12px;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .intent-table tr:last-child td { border-bottom: none; }
        
        .tag { display: inline-block; padding: 2px 8px; background: #e3f2fd; color: #1565c0; border-radius: 4px; font-size: 11px; margin-right: 4px; }
        .tag-green { background: #e8f5e9; color: #2e7d32; }
        
        /* 推荐卡片 */
        .rec-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #4CAF50;
        }
        
        .rec-card-title { font-size: 12px; color: #4CAF50; font-weight: 600; margin-bottom: 8px; }
        .rec-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
        .rec-row:last-child { border-bottom: none; }
        .rec-brand { font-weight: 600; font-size: 13px; }
        .rec-product { color: #666; font-size: 12px; }
        .rec-price { color: #4CAF50; font-weight: 600; font-size: 12px; }
        
        /* 追问 */
        .question-box { background: #fff3e0; border-radius: 8px; padding: 12px; }
        .question-text { color: #e65100; font-weight: 600; font-size: 13px; margin-bottom: 10px; }
        .options { display: flex; flex-direction: column; gap: 6px; }
        .option-btn { padding: 10px 14px; background: #fff; border: 1px solid #ffb74d; border-radius: 6px; text-align: left; cursor: pointer; font-size: 13px; }
        
        /* 历史 */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .history-table th { background: #f5f5f5; padding: 8px; text-align: left; font-size: 11px; color: #666; }
        .history-table td { padding: 8px; font-size: 12px; border-bottom: 1px solid #f0f0f0; }
        
        .loading-dots { display: flex; gap: 4px; padding: 10px; }
        .loading-dots span { width: 8px; height: 8px; background: #1e3c72; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="chat-container">
            <div class="chat-header">
                <div class="avatar">🎯</div>
                <div class="header-info"><h2>小R - 消费识别助手</h2><p>家庭消费意图识别</p></div>
            </div>
            <div class="family-tabs" id="familyTabs"><button class="family-tab active">吴海超家</button></div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot"><div class="msg-avatar">🎯</div><div class="msg-content">你好！我是家庭消费意图识别助手 🎯<br>告诉我你想买什么，我会帮你记录需求并推荐合适的品牌。</div></div>
            </div>
            <div class="quick-inputs">
                <button class="quick-btn" onclick="sendQuick('孩子要开学了')">孩子要开学了</button>
                <button class="quick-btn" onclick="sendQuick('家里冰箱坏了')">家里冰箱坏了</button>
                <button class="quick-btn" onclick="sendQuick('想买点水果')">想买点水果</button>
                <button class="quick-btn" onclick="sendQuick('给孩子买书包')">给孩子买书包</button>
            </div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="输入你想买的东西..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">➤</button>
            </div>
        </div>
        
        <div class="result-container">
            <div class="result-header">📋 意图识别结果</div>
            <div class="result-content" id="resultContent">
                <div class="empty-state"><div class="empty-state-icon">📝</div><p>发送消息后，意图识别结果将显示在这里</p></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3847';
        let currentFamilyId = 'family_1';
        let isLoading = false;
        let historyData = [];
        
        document.addEventListener('DOMContentLoaded', () => { loadFamilies(); });
        
        async function loadFamilies() {
            try {
                const res = await fetch(`${API_URL}/api/families`);
                const families = await res.json();
                if (families.length > 0) {
                    document.getElementById('familyTabs').innerHTML = families.map((f, i) => `<button class="family-tab ${i===0?'active':''}" data-id="${f.family_id}">${f.family_name}</button>`).join('');
                    currentFamilyId = families[0].family_id;
                }
            } catch (e) { console.error(e); }
        }
        
        async function sendMessage() {
            const msg = document.getElementById('messageInput').value.trim();
            if (!msg || isLoading) return;
            addMessage('user', msg);
            document.getElementById('messageInput').value = '';
            showLoading();
            try {
                const res = await fetch(`${API_URL}/api/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: msg, family_id: currentFamilyId}) });
                const result = await res.json();
                hideLoading();
                displayResult(result);
                syncToFeishu(result); // 同步到飞书
            } catch (e) { hideLoading(); addMessage('bot', '连接失败'); }
        }
        
        function sendQuick(text) { document.getElementById('messageInput').value = text; sendMessage(); }
        
        async function handleOption(value) {
            if (isLoading) return;
            addMessage('user', value);
            showLoading();
            try {
                const res = await fetch(`${API_URL}/api/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({option: value, family_id: currentFamilyId}) });
                const result = await res.json();
                hideLoading();
                displayResult(result);
                syncToFeishu(result);
            } catch (e) { hideLoading(); addMessage('bot', '连接失败'); }
        }
        
        function addMessage(type, content) {
            const c = document.getElementById('chatMessages');
            c.innerHTML += `<div class="message ${type}"><div class="msg-avatar">${type==='bot'?'🎯':'👤'}</div><div class="msg-content">${content}</div></div>`;
            c.scrollTop = c.scrollHeight;
        }
        
        function showLoading() {
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('chatMessages').innerHTML += `<div class="message bot" id="loadingMsg"><div class="msg-avatar">🎯</div><div class="msg-content"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>`;
        }
        
        function hideLoading() {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            const l = document.getElementById('loadingMsg');
            if (l) l.remove();
        }
        
        function displayResult(result) {
            const intent = result.intent || {};
            const el = document.getElementById('resultContent');
            
            // 构建表格行
            let rows = '';
            if (intent.object) rows += `<tr><td>📦 商品</td><td>${intent.object}</td></tr>`;
            if (intent.target) rows += `<tr><td>👤 消费对象</td><td>${intent.target}</td></tr>`;
            if (intent.scene) rows += `<tr><td>🎬 消费场景</td><td>${intent.scene}</td></tr>`;
            
            let html = '';
            
            if (result.is_complete) {
                // 添加历史
                historyData.unshift({ object: intent.object||'-', target: intent.target||'-', scene: intent.scene||'-', time: new Date().toLocaleTimeString() });
                if (historyData.length > 5) historyData.pop();
                
                html = `
                    <table class="intent-table">
                        <tr><th colspan="2" style="background:#e8f5e9;color:#2e7d32;">✅ 已记录</th></tr>
                        ${rows}
                    </table>
                `;
                
                // 推荐
                if (result.recommendations && result.recommendations.length > 0) {
                    html += `<div class="rec-card"><div class="rec-card-title">✓ 为你推荐</div>`;
                    result.recommendations.forEach(r => {
                        html += `<div class="rec-row"><div><div class="rec-brand">${r.brand}</div><div class="rec-product">${r.product}</div></div><div class="rec-price">${r.price_range}</div></div>`;
                    });
                    html += `</div>`;
                }
                
                // 历史表格
                if (historyData.length > 0) {
                    html += `<table class="history-table"><tr><th>📝 历史记录</th><th></th></tr>`;
                    historyData.forEach(h => {
                        html += `<tr><td>📦 ${h.object} / 👤${h.target} / 🎬${h.scene}</td><td style="color:#999">${h.time}</td></tr>`;
                    });
                    html += `</table>`;
                }
                
                addMessage('bot', '✅ 你的需求已记录！请查看下方推荐～');
            } else {
                html = `
                    <table class="intent-table">
                        <tr><th colspan="2" style="background:#fff3e0;color:#e65100;">❌ 待完善</th></tr>
                        ${rows || '<tr><td colspan="2" style="color:#999">等待识别...</td></tr>'}
                    </table>
                `;
                
                if (result.next_question) {
                    html += `<div class="question-box"><div class="question-text">${result.next_question.question}</div><div class="options">`;
                    if (result.next_question.options) {
                        result.next_question.options.forEach(opt => {
                            html += `<button class="option-btn" onclick="handleOption('${opt.value}')">${opt.label}</button>`;
                        });
                    }
                    html += `</div></div>`;
                }
                
                addMessage('bot', result.next_question ? result.next_question.question : '请补充更多信息～');
            }
            
            el.innerHTML = html;
        }
        
        // 同步到飞书
        async function syncToFeishu(result) {
            try {
                await fetch(`${API_URL}/api/sync-intent`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        family_id: currentFamilyId,
                        intent: result.intent,
                        is_complete: result.is_complete,
                        recommendations: result.recommendations
                    })
                });
            } catch (e) { console.log('飞书同步失败', e); }
        }
        
        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
