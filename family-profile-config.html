<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭画像配置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        label {
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        
        input, select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .checkbox-item.active {
            background: #667eea;
            color: white;
        }
        
        .checkbox-item input {
            display: none;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-sync {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            width: 100%;
            margin-top: 12px;
        }
        
        .btn-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: #4CAF50;
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .family-list {
            display: grid;
            gap: 16px;
        }
        
        .family-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        
        .family-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .family-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .family-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
        }
        
        .family-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        
        .btn-edit {
            background: #4CAF50;
            color: white;
        }
        
        .btn-delete {
            background: #f44336;
            color: white;
        }
        
        .family-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 0.85rem;
        }
        
        .info-item {
            display: flex;
            gap: 4px;
        }
        
        .info-label {
            color: #888;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
        }
        
        .tags {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 4px 10px;
            background: #e0e0e0;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #666;
        }
        
        .tag.active {
            background: #667eea;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            .family-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 家庭画像配置</h1>
        
        <div class="card">
            <h2>➕ 添加新家庭</h2>
            <form id="familyForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>家庭名称</label>
                        <input type="text" id="familyName" placeholder="如：吴海超家" required>
                    </div>
                    
                    <div class="form-group">
                        <label>收入水平</label>
                        <select id="incomeLevel">
                            <option value="高">高收入</option>
                            <option value="中" selected>中等收入</option>
                            <option value="低">低收入</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>家庭成员</label>
                        <input type="text" id="members" placeholder="如：爸爸、妈妈、孩子" required>
                    </div>
                    
                    <div class="form-group">
                        <label>消费习惯</label>
                        <select id="spendingHabit">
                            <option value="节俭">节俭</option>
                            <option value="中等" selected>中等</option>
                            <option value="大方">大方</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>特殊成员</label>
                        <div class="checkbox-group" id="specialMembers">
                            <label class="checkbox-item" data-value="has_child">
                                <input type="checkbox" name="special" value="has_child">
                                👶 有小孩
                            </label>
                            <label class="checkbox-item" data-value="has_elderly">
                                <input type="checkbox" name="special" value="has_elderly">
                                👴 有老人
                            </label>
                            <label class="checkbox-item" data-value="has_pregnant">
                                <input type="checkbox" name="special" value="has_pregnant">
                                🤰 有孕妇
                            </label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">💾 保存家庭画像</button>
                <button type="button" class="btn btn-sync" onclick="syncToMemory()">🔄 同步到 MEMORY.md</button>
            </form>
        </div>
        
        <div class="card">
            <h2>📋 已配置的家庭</h2>
            <div id="familyList" class="family-list">
                <div class="empty-state">
                    <div class="empty-state-icon">🏠</div>
                    <p>暂无家庭画像，请添加</p>
                </div>
            </div>
        </div>
    <div id="toast" class="toast">✅ 同步成功！</div>
    </div>
    
    <script>
        // 存储键名
        const STORAGE_KEY = 'family_profiles';
        
        // API 地址
        const API_URL = 'http://localhost:3847';
        
        // 当前编辑的 ID
        let editingId = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadFamilies();
            setupCheckbox();
            setupForm();
        });
        
        // 复选框交互
        function setupCheckbox() {
            document.querySelectorAll('.checkbox-item').forEach(item => {
                item.addEventListener('click', () => {
                    item.classList.toggle('active');
                    const checkbox = item.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                });
            });
        }
        
        // 表单提交
        function setupForm() {
            document.getElementById('familyForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const family = {
                    id: editingId || Date.now(),
                    family_name: document.getElementById('familyName').value,
                    members: document.getElementById('members').value,
                    income_level: document.getElementById('incomeLevel').value,
                    spending_habit: document.getElementById('spendingHabit').value,
                    has_child: document.querySelector('input[name="special"][value="has_child"]').checked,
                    has_elderly: document.querySelector('input[name="special"][value="has_elderly"]').checked,
                    has_pregnant: document.querySelector('input[name="special"][value="has_pregnant"]').checked,
                    updated_at: new Date().toISOString()
                };
                
                saveFamily(family);
                resetForm();
                loadFamilies();
            });
        }
        
        // 保存家庭
        function saveFamily(family) {
            let families = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            if (editingId) {
                families = families.map(f => f.id === editingId ? family : f);
            } else {
                families.push(family);
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(families));
            editingId = null;
        }
        
        // 加载家庭列表
        function loadFamilies() {
            const families = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const container = document.getElementById('familyList');
            
            if (families.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏠</div>
                        <p>暂无家庭画像，请添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = families.map(family => `
                <div class="family-card">
                    <div class="family-header">
                        <div class="family-name">${family.family_name}</div>
                        <div class="family-actions">
                            <button class="btn btn-sm btn-edit" onclick="editFamily(${family.id})">✏️ 编辑</button>
                            <button class="btn btn-sm btn-delete" onclick="deleteFamily(${family.id})">🗑️ 删除</button>
                        </div>
                    </div>
                    <div class="family-info">
                        <div class="info-item">
                            <span class="info-label">成员:</span>
                            <span class="info-value">${family.members}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">收入:</span>
                            <span class="info-value">${family.income_level}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">消费:</span>
                            <span class="info-value">${family.spending_habit}</span>
                        </div>
                    </div>
                    <div class="tags">
                        ${family.has_child ? '<span class="tag active">👶 有小孩</span>' : ''}
                        ${family.has_elderly ? '<span class="tag active">👴 有老人</span>' : ''}
                        ${family.has_pregnant ? '<span class="tag active">🤰 有孕妇</span>' : ''}
                    </div>
                </div>
            `).join('');
        }
        
        // 编辑家庭
        function editFamily(id) {
            const families = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const family = families.find(f => f.id === id);
            
            if (!family) return;
            
            editingId = id;
            document.getElementById('familyName').value = family.family_name;
            document.getElementById('members').value = family.members;
            document.getElementById('incomeLevel').value = family.income_level;
            document.getElementById('spendingHabit').value = family.spending_habit;
            
            // 设置特殊成员
            document.querySelectorAll('.checkbox-item').forEach(item => {
                const value = item.dataset.value;
                const checkbox = item.querySelector('input');
                checkbox.checked = family[value];
                item.classList.toggle('active', family[value]);
            });
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 删除家庭
        function deleteFamily(id) {
            if (!confirm('确定要删除这个家庭画像吗？')) return;
            
            let families = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            families = families.filter(f => f.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(families));
            loadFamilies();
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('familyForm').reset();
            editingId = null;
            document.querySelectorAll('.checkbox-item').forEach(item => {
                item.classList.remove('active');
                item.querySelector('input').checked = false;
            });
        }
        
        // 同步到 MEMORY.md
        async function syncToMemory() {
            const families = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            if (families.length === 0) {
                showToast('⚠️ 没有家庭画像需要同步', '#f44336');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/api/sync-family`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profiles: families })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    showToast('✅ 已同步到 MEMORY.md');
                } else {
                    showToast('❌ 同步失败: ' + result.message, '#f44336');
                }
            } catch (e) {
                showToast('❌ 连接失败，请先启动同步服务', '#f44336');
            }
        }
        
        // 显示提示
        function showToast(message, color = '#4CAF50') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
